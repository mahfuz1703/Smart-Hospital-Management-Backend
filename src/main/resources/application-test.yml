spring:
  datasource:
    url: jdbc:h2:mem:smart_health_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  # For now, disable external infra auto-connection in tests.
  # We'll add proper testcontainers later if you want.
  data:
    redis:
      repositories:
        enabled: false
    elasticsearch:
      repositories:
        enabled: false