spring:
  application:
    name: smart-health

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  datasource:
    url: jdbc:postgresql://localhost:5433/smart_health
    username: smarthealth
    password: smarthealth
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: false
    elasticsearch:
      enabled: false

app:
  security:
    jwt:
      secret: "CHANGE_ME__use_at_least_32_chars_long_secret_key"
      access-token-ttl-seconds: 900 # 15 minutes

logging:
  level:
    org.springframework.security: TRACE